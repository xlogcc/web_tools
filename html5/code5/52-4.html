<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Document</title>
	<style>
		div{
			width: 300px;
			height: 600px;
			border:1px solid black;
			border-right: 300px solid black;
			border-radius:300px;
			background: red;
		}
		div::before{
			content:'';
			display:block;
			width: 100px;
			height: 100px;
			border:100px solid black;
			border-radius: 150px;
			background: red;
			margin-left: 150px;
		}
		div::after{
			content:'';
			display:block;
			width: 100px;
			height: 100px;
			background: black;
			border:100px solid red;
			border-radius: 150px;
			margin-left: 150px;
		}
	</style>
</head>
<body>
	<div></div>
</body>
</html>
