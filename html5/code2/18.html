<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Document</title>
	<style>
		#big{
			width:700px;
			height: 300px;
			background: red;
			margin: 50px auto;
		}
		#left{
			width: 50%;
			height: 100%;
			background: pink;
			float: left;
			border:20px solid lightblue;
			box-sizing:border-box;
		}
		#right{
			width: 50%;
			height: 100%;
			background: gray;
			float: right;
			border: 20px solid purple;
			box-sizing:border-box;
		}
	</style>
</head>
<body>
	<div id="big">
		<div id="left"></div>
		<div id="right"></div>
	</div>
</body>
</html>
