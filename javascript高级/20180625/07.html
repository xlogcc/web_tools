<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="keyword" content="布尔教育">
    <title>Document</title>
</head>
<body>
    // 阻止事件的默认行为
    <form action="https://www.baidu.com">
        <input type="text">
        <input type="submit" value="提交">
    </form>
</body>
<script>
var fm = document.getElementsByTagName('form')[0];
fm.addEventListener('submit' , function(e) {
    alert('ajax提交');
    e.preventDefault();
});
</script>
</html>
